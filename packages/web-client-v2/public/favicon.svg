<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Ardoise PWA app icon: chalk fork·plate·knife on a slate chalkboard.
       Artwork kept within the central maskable safe zone (~80%). -->
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.40" r="0.75">
      <stop offset="0" stop-color="#2a332b"/>
      <stop offset="1" stop-color="#14180f"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <filter id="chalk2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" filter="url(#grain)" opacity="0.05"/>

  <g fill="none" stroke="#f1ead9" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#chalk2)">
    <!-- clock (the meal-time mark) -->
    <circle cx="256" cy="258" r="66"/>
    <g stroke-width="11"><path d="M256 196 V206 M322 258 H312 M256 320 V310 M190 258 H200"/></g>
    <path d="M256 258 L256 222"/>
    <path d="M256 258 L302 258"/>
    <circle cx="256" cy="258" r="5" fill="#f1ead9" stroke="none"/>
    <!-- fork -->
    <path d="M132 120 L132 178 Q132 200 150 208"/>
    <path d="M150 120 L150 208"/>
    <path d="M168 120 L168 178 Q168 200 150 208"/>
    <path d="M150 208 L150 398"/>
    <!-- knife (moved out, clear of the clock) -->
    <path d="M388 120 L388 398"/>
    <path d="M388 120 C 330 180, 330 250, 388 288"/>
  </g>
</svg>
